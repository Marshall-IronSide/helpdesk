services:
  - type: web
    name: mini-helpdesk
    runtime: php
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:clear && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false